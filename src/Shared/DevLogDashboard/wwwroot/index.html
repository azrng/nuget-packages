<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#409EFF">
    <title>DevLogDashboard</title>
    <link rel="stylesheet" href="./styles.css?v=8">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <nav class="tabs" role="tablist">
                    <a href="#" class="tab active" data-tab="logs" role="tab" aria-selected="true" aria-controls="panelLogs">Logs</a>
                    <a href="#" class="tab" data-tab="traces" role="tab" aria-selected="false" aria-controls="panelTraces">Traces</a>
                </nav>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="btnRefresh" title="刷新" aria-label="刷新日志">
                    <svg class="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" class="search-input"
                       placeholder="搜索：输入关键词或 message=&quot;xxx&quot;、requestId=&quot;xxx&quot; 等">
                <button class="btn-search" id="btnSearch" aria-label="搜索">
                    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 筛选工具栏 -->
        <div class="filter-bar">
            <label class="checkbox-label">
                <input type="checkbox" id="chkOrderByTime"> 按时间排序
            </label>
            <select id="ddlLevel" class="select">
                <option value="">All Levels</option>
                <option value="Trace">Trace</option>
                <option value="Debug">Debug</option>
                <option value="Information">Information</option>
                <option value="Warning">Warning</option>
                <option value="Error">Error</option>
                <option value="Critical">Critical</option>
            </select>
            <div class="date-range">
                <div class="date-quick-select">
                    <button class="btn-quick-date" data-minutes="1">最近 1 分钟</button>
                    <button class="btn-quick-date" data-minutes="30">最近 30 分钟</button>
                    <button class="btn-quick-date" data-hours="1">最近 1 小时</button>
                    <button class="btn-quick-date" data-hours="12">最近 12 小时</button>
                </div>
                <input type="datetime-local" id="txtStartTime" class="date-input">
                <span class="date-separator">~</span>
                <input type="datetime-local" id="txtEndTime" class="date-input">
                <button class="btn-date" id="btnDateRange" aria-label="按日期范围搜索">
                    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="main-content" role="main">
            <!-- Logs 面板 -->
            <div id="panelLogs" class="panel active" role="tabpanel">
                <div id="logList" class="log-list">
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke-width="2"/>
                        </svg>
                        <p>没有相关日志</p>
                    </div>
                </div>
                <div id="logPagination" class="pagination"></div>
            </div>

            <!-- Traces 面板 -->
            <div id="panelTraces" class="panel" role="tabpanel">
                <div id="traceList" class="trace-list">
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/>
                        </svg>
                        <p>没有追踪记录</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 日志详情弹窗 -->
    <div id="logDetailModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">日志详情</h3>
                <button class="btn-close" onclick="closeLogDetail()" aria-label="关闭">&times;</button>
            </div>
            <div class="modal-body" id="logDetailBody">
                <!-- 详情内容动态填充 -->
            </div>
        </div>
    </div>

    <script src="./app.js?v=23"></script>
</body>
</html>
