name: Generate API Documentation

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'docs-generator/**'
      - '.github/workflows/generate-docs.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'docs-generator/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore PackPackages.slnx

      - name: 🔨 Build PackPackages solution
        run: |
          # 构建 PackPackages 解决方案并生成 XML 文档
          # XML 文档会生成在各个项目的 bin/Release/netX.X/ 目录下
          dotnet build PackPackages.slnx \
            -p:GenerateDocumentationFile=true \
            -p:NoWarn=CS1591 \
            -c Release

      - name: 📋 Verify XML files
        run: |
          # 验证 XML 文档已生成
          echo "🔍 查找生成的 XML 文件..."
          find src -name "*.xml" -path "*/bin/Release/*" | head -20
          echo "✅ XML 文档生成完成"

      - name: 📋 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-generator/package-lock.json

      - name: 📦 Install documentation generator dependencies
        working-directory: ./docs-generator
        run: npm ci

      - name: 🔨 Build documentation generator
        working-directory: ./docs-generator
        run: npm run build

      - name: 📚 Generate API documentation
        working-directory: ./docs-generator
        run: npm start

      - name: 📤 Upload documentation artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # 文档生成器会输出到 docs/index.html
          path: ./docs

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
